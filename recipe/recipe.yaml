schema_version: 1

context:
  name: hdbpp-cm
  version: "2.2.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://gitlab.com/tango-controls/hdbpp/hdbpp-cm/-/archive/${{ version }}/hdbpp-cm-${{ version }}.tar.gz
  sha256: c8152a3079af9bd2a69d7c24405379b838d28e08f78f91dd15b1982fa9747d77

build:
  number: 0

requirements:
  build:
    - cmake
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - if: unix
      then:
        - make
        - pkg-config
  host:
    - cppzmq
    - cpptango
    - omniorb-libs

tests:
  - script:
      - hdb++cm-srv --help 2>&1 | grep -i usage

about:
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Tango device server for the HDB++ Configuration Manager
  homepage: https://www.tango-controls.org
  repository: https://gitlab.com/tango-controls/hdbpp/hdbpp-cm
  documentation: https://tango-controls.readthedocs.io/en/latest/tools-and-extensions/archiving/HDB++.html

extra:
  recipe-maintainers:
    - beenje
